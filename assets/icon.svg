<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(124,58,237,0.5)"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Inner glow ring -->
  <rect x="24" y="24" width="464" height="464" rx="96" ry="96"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- Play/download arrow body -->
  <rect x="228" y="128" width="56" height="168" rx="28" ry="28" fill="url(#arrow)"/>

  <!-- Arrowhead -->
  <path d="M152 280 L256 384 L360 280 Z" rx="16" fill="url(#arrow)"/>

  <!-- Base line -->
  <rect x="136" y="360" width="240" height="32" rx="16" ry="16" fill="rgba(255,255,255,0.6)"/>
</svg>
